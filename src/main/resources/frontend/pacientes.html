<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pacientes | Saúde Municipal</title>
  <link rel="stylesheet" href="./css/style.css" />
</head>
<body>
  <div class="app-layout">
    <aside class="sidebar">
      <div class="sidebar-brand">
        <span class="badge">Admin</span>
        <h2>Saúde Municipal</h2>
      </div>

      <nav class="sidebar-nav">
        <a href="./dashboard.html">Dashboard</a>
        <a href="./pacientes.html" class="active">Pacientes</a>
        <a href="./consultas.html">Consultas</a>
        <a href="./profissionais.html">Profissionais</a>
        <a href="./unidades.html">Unidades</a>
        <a href="./agenda.html">Agenda</a>
      </nav>

      <button id="logout-btn" class="btn btn-danger btn-full">Sair</button>
    </aside>

    <main class="content">
      <header class="topbar">
        <div>
          <h1>Pacientes</h1>
          <p>Cadastro e listagem com paginação</p>
        </div>
      </header>

      <section class="panel">
        <div class="panel-header">
          <h2>Cadastrar paciente</h2>
        </div>

        <form id="paciente-form" class="form-grid two-columns">
          <div class="form-group">
            <label for="nomeCompleto">Nome completo</label>
            <input type="text" id="nomeCompleto" required />
          </div>

          <div class="form-group">
            <label for="cpfCadastro">CPF</label>
            <input type="text" id="cpfCadastro" required />
          </div>

          <div class="form-group">
            <label for="cns">CNS</label>
            <input type="text" id="cns" />
          </div>

          <div class="form-group">
            <label for="dataNascimento">Data de nascimento</label>
            <input type="date" id="dataNascimento" required />
          </div>

          <div class="form-group">
            <label for="sexo">Sexo</label>
            <input type="text" id="sexo" placeholder="Ex: FEMININO" />
          </div>

          <div class="form-group">
            <label for="telefoneCadastro">Telefone</label>
            <input type="text" id="telefoneCadastro" />
          </div>

          <div class="form-group">
            <label for="emailCadastro">E-mail</label>
            <input type="email" id="emailCadastro" />
          </div>

          <div class="form-group">
            <label for="endereco">Endereço</label>
            <input type="text" id="endereco" />
          </div>

          <div class="form-group">
            <label for="unidadeCadastroId">ID da unidade</label>
            <input type="number" id="unidadeCadastroId" required />
          </div>

          <div class="form-actions-full">
            <button type="submit" class="btn btn-primary">Cadastrar paciente</button>
          </div>

          <div id="paciente-message" class="message-box hidden form-message-full"></div>
        </form>
      </section>

      <section class="panel">
        <div class="panel-header">
          <h2>Filtros</h2>
        </div>

        <form id="pacientes-filter-form" class="filters-grid">
          <input type="text" id="nome" placeholder="Nome do paciente" />
          <input type="text" id="cpf" placeholder="CPF" />
          <input type="number" id="unidadeId" placeholder="ID da unidade" />

          <select id="ativo">
            <option value="">Status</option>
            <option value="true">Ativo</option>
            <option value="false">Inativo</option>
          </select>

          <button type="submit" class="btn btn-primary">Buscar</button>
        </form>
      </section>

      <section class="panel">
        <div class="panel-header">
          <h2>Lista de pacientes</h2>
        </div>

        <div id="pacientes-table" class="table-wrapper">
          <p>Carregando pacientes...</p>
        </div>

        <div class="pagination-bar">
          <button id="prev-page" class="btn">Anterior</button>
          <span id="page-info">Página 1</span>
          <button id="next-page" class="btn">Próxima</button>
        </div>
      </section>
    </main>
  </div>

  <script src="./js/api.js"></script>
  <script src="./js/pacientes.js"></script>
</body>
</html>

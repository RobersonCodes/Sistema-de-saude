<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login | Saúde Municipal</title>

  <link rel="stylesheet" href="./css/style.css" />
</head>

<body class="auth-body">

  <div class="auth-container">

    <div class="auth-card">

      <div class="brand-block">
        <span class="badge">Sistema SUS</span>

        <h1>Saúde Municipal</h1>

        <p>
          Plataforma de gestão de saúde pública
        </p>
      </div>


      <form id="login-form" class="form-grid">

        <div class="form-group">

          <label for="email">
            Email
          </label>

          <input
            type="email"
            id="email"
            placeholder="admin@email.com"
            required
          />

        </div>


        <div class="form-group">

          <label for="senha">
            Senha
          </label>

          <input
            type="password"
            id="senha"
            placeholder="Digite sua senha"
            required
          />

        </div>


        <button
          type="submit"
          class="btn btn-primary btn-full"
        >
          Entrar
        </button>


        <div
          id="login-message"
          class="message-box hidden"
        >
        </div>

      </form>


      <div style="margin-top:20px; font-size:13px; color:#6b7280; text-align:center;">

        <p>
          API protegida por JWT
        </p>

        <p>
          Spring Boot 3 • Java 17 • Swagger
        </p>

      </div>

    </div>

  </div>


  <script src="./js/api.js"></script>

  <script src="./js/auth.js"></script>

</body>

</html>
